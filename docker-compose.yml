services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chorus-postgres
    environment:
      POSTGRES_DB: messenger_dev
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: chorus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chorus-backend
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgres://messenger:password@postgres:5432/messenger_dev?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY:-}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
      - NLLB_URL=http://nllb:5000
      - PORT=8080
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:-https://appwrite.zumy.app/v1}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID:-6955733a001c10e7c020}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY:-}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID:-6955749200181b13d9d6}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nllb:
        condition: service_started
    restart: unless-stopped

  # NLLB Translation Service (Phase 1 — fast translation, 200+ languages)
  nllb:
    build:
      context: ./backend/nllb-serve
      dockerfile: Dockerfile
    container_name: chorus-nllb
    ports:
      - "127.0.0.1:5002:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; import json; req = urllib.request.Request('http://localhost:5000/translate', data=json.dumps({'text':'hi','source':'eng_Latn','target':'spa_Latn'}).encode(), headers={'Content-Type':'application/json'}); urllib.request.urlopen(req, timeout=15)"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  # Ollama Translation Service
  ollama:
    image: ollama/ollama:latest
    container_name: chorus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    entrypoint: >
      sh -c "ollama serve &
      sleep 3 &&
      ollama pull qwen2.5:3b &&
      sleep 2 &&
      echo 'Ollama ready' &&
      wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_APPWRITE_ENDPOINT=${VITE_APPWRITE_ENDPOINT:-https://appwrite.zumy.app/v1}
        - VITE_APPWRITE_PROJECT_ID=${VITE_APPWRITE_PROJECT_ID:-6955733a001c10e7c020}
        - VITE_APPWRITE_DATABASE_ID=${VITE_APPWRITE_DATABASE_ID:-6955749200181b13d9d6}
        - VITE_APPWRITE_CLIENT_API_KEY=${VITE_APPWRITE_CLIENT_API_KEY:-}
    container_name: chorus-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
