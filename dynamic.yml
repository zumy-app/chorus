http:
  routers:
    chorus:
      rule: "Host(`chorus.talk`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: chorus
  services:
    chorus:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"
          - url: "http://chorus-frontend:3000"
